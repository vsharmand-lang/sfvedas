<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 28" fill="none">
  <defs>
    <!-- Saffron gradient for the top face: back-bright → front-warm -->
    <linearGradient id="top-grad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#FDD27A"/>
      <stop offset="100%" stop-color="#E8930A"/>
    </linearGradient>
    <!-- Highlight shimmer on top face -->
    <linearGradient id="top-shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="60%"  stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ══════════════════════════════════
       TOP FACE  — saffron/orange, on-brand
       ══════════════════════════════════ -->
  <path d="M16,2 L28,8 L16,14 L4,8 Z" fill="url(#top-grad)"/>
  <!-- subtle highlight -->
  <path d="M16,2 L28,8 L16,14 L4,8 Z" fill="url(#top-shine)"/>

  <!-- ══════════════════════════════════
       LEFT FACE — Google stripes + shadow
       ══════════════════════════════════ -->
  <path d="M4,8  L16,14 L16,17 L4,11 Z"  fill="#4285F4"/>
  <path d="M4,11 L16,17 L16,20 L4,14 Z"  fill="#EA4335"/>
  <path d="M4,14 L16,20 L16,23 L4,17 Z"  fill="#FBBC05"/>
  <path d="M4,17 L16,23 L16,26 L4,20 Z"  fill="#34A853"/>
  <path d="M4,8  L16,14 L16,26 L4,20 Z"  fill="rgba(0,0,0,0.20)"/>

  <!-- ══════════════════════════════════
       RIGHT FACE — Google stripes + subtle shadow
       ══════════════════════════════════ -->
  <path d="M16,14 L28,8  L28,11 L16,17 Z" fill="#4285F4"/>
  <path d="M16,17 L28,11 L28,14 L16,20 Z" fill="#EA4335"/>
  <path d="M16,20 L28,14 L28,17 L16,23 Z" fill="#FBBC05"/>
  <path d="M16,23 L28,17 L28,20 L16,26 Z" fill="#34A853"/>
  <path d="M28,8  L16,14 L16,26 L28,20 Z" fill="rgba(0,0,0,0.07)"/>

  <!-- ══════════════════════════════════
       FACE DIVIDERS
       ══════════════════════════════════ -->
  <g stroke="rgba(255,255,255,0.45)" stroke-width="0.9"
     stroke-linecap="round" fill="none">
    <line x1="4"  y1="8"  x2="16" y2="14"/>
    <line x1="28" y1="8"  x2="16" y2="14"/>
    <line x1="16" y1="14" x2="16" y2="26"/>
  </g>
  <path d="M16,2 L28,8 L28,20 L16,26 L4,20 L4,8 Z"
        stroke="rgba(255,255,255,0.15)" stroke-width="0.5" fill="none"/>
</svg>
